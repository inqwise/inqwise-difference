name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

jobs:
  release:
    name: Release to Maven Central
    runs-on: ubuntu-latest
    if: github.repository == 'inqwise/inqwise-difference'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven
        server-id: sonatype-oss-release
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE
        
    - name: Configure Git user
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        
    - name: Build and test
      run: mvn clean test

    - name: Resolve release metadata
      id: release_meta
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        NEXT_VERSION=$(echo "$VERSION" | awk -F. '{$NF = $NF + 1; print}' OFS=.)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "next_version=${NEXT_VERSION}-SNAPSHOT" >> "$GITHUB_OUTPUT"
      
    - name: Maven Release (Manual Trigger)
      if: github.event_name == 'workflow_dispatch'
      run: |
        mvn release:clean release:prepare release:perform \
          -DreleaseVersion=${{ steps.release_meta.outputs.version }} \
          -DdevelopmentVersion=${{ steps.release_meta.outputs.next_version }} \
          -Dtag=v${{ steps.release_meta.outputs.version }} \
          -DskipTests
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          
    - name: Deploy to Maven Central (Tag-based Release)
      if: github.event_name == 'release'
      run: mvn clean deploy -P sonatype-oss-release -DskipTests
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        
    - name: Prepare Release Assets
      run: |
        # The Maven release process already built the correct artifacts
        # We need to find them in the Maven local repository after release:perform
        VERSION="${{ steps.release_meta.outputs.version }}"
        MAVEN_REPO="$HOME/.m2/repository/com/inqwise/difference/inqwise-difference/$VERSION"
        
        mkdir -p release-assets
        
        # Copy the release artifacts from Maven local repository
        if [ -d "$MAVEN_REPO" ]; then
          cp "$MAVEN_REPO/inqwise-difference-$VERSION.jar" release-assets/ || echo "Main JAR not found"
          cp "$MAVEN_REPO/inqwise-difference-$VERSION-sources.jar" release-assets/ || echo "Sources JAR not found"
          cp "$MAVEN_REPO/inqwise-difference-$VERSION-javadoc.jar" release-assets/ || echo "Javadoc JAR not found"
        else
          echo "Maven repository directory not found: $MAVEN_REPO"
          echo "Falling back to building artifacts with correct version"
          # Checkout the release tag to build the correct version
          git checkout "v$VERSION"
          mvn clean package -P sonatype-oss-release -DskipTests
          cp target/inqwise-difference-*.jar release-assets/
        fi
        
        # List what we actually have
        echo "Release assets prepared:"
        ls -la release-assets/
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        
    - name: Create GitHub Release (Manual Trigger)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ steps.release_meta.outputs.version }}
        name: Release v${{ steps.release_meta.outputs.version }}
        body: |
          🚀 **Release v${{ steps.release_meta.outputs.version }}**
          
          ## 📦 Maven Central
          ```xml
          <dependency>
              <groupId>com.inqwise.difference</groupId>
              <artifactId>inqwise-difference</artifactId>
              <version>${{ steps.release_meta.outputs.version }}</version>
          </dependency>
          ```
          
          ## 📋 Release Assets
          - Main library JAR
          - Sources JAR
          - Javadoc JAR
          - All artifacts GPG signed
          
          ## 🔗 Links
          - [Maven Central](https://central.sonatype.com/artifact/com.inqwise.difference/inqwise-difference/${{ steps.release_meta.outputs.version }})
          - [Documentation](https://github.com/inqwise/inqwise-difference#readme)
          
          ---
          *Released automatically via GitHub Actions*
        files: release-assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Release Assets (Existing Release)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v3
      with:
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
